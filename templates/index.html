<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>أذكاري</title>
<style>
    body {
        text-align: center;
        background-color: #f0f0f0;
        font-family: sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        padding-bottom: 50px;
    }
    body.dark {
        background-color: #1a1a1a;
        color: #f0f0f0;
    }

    h1 {
        font-size: 36px;
        color: #2c3e50;
        margin-top: 30px;
    }

    img {
        max-width: 80%;
        height: auto;
        margin: 20px 0;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #countdown, #nextPeriod {
        font-size: 20px;
        margin: 15px 0;
    }

    button {
        padding: 12px 25px;
        margin: 10px 5px;
        background: linear-gradient(135deg, #4CAF50, #2E8B57);
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #45a049, #276b45);
    }

    #randomZikr {
        font-size: 26px;
        margin-top: 30px;
        font-weight: bold;
        background-color: #ffffffcc;
        color: #2c3e50;
        padding: 15px 20px;
        border-radius: 15px;
        display: inline-block;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.dark #randomZikr {
        background-color: #333333cc;
        color: #f0f0f0;
    }

    #progressBarContainer {
        width: 80%;
        height: 8px;
        background-color: #ccc;
        margin: 15px auto;
        border-radius: 5px;
        overflow: hidden;
    }

    #progressBar {
        width: 0%;
        height: 100%;
        background-color: #4CAF50;
        transition: width 0.1s linear;
    }
</style>
</head>
<body>
<h1>أذكاري</h1>

<img id="azkarImage" src="{{ url_for('static', filename=image_file) }}" alt="أذكار">

<div id="countdown">العد التنازلي لتغيير الأذكار: ...</div>
<div id="nextPeriod">الفترة التالية للأذكار: ...</div>

<div style="margin-top: 25px;">
  <a href="http://b5b5.com/1/" target="_blank">
    <button>سورة الكهف</button>
  </a>
  <a href="/zikr-calculator">
    <button>حاسبة الأذكار</button>
  </a>
</div>

<div style="margin-top: 20px;">
  <button onclick="toggleDarkMode()">تبديل الوضع الليلي</button>
</div>

<div id="randomZikr">...انتظر قليلًا</div>
<div id="progressBarContainer">
    <div id="progressBar"></div>
</div>

<script>
const nextSwitch = {{ next_switch }};
const countdownEl = document.getElementById("countdown");
const nextPeriodEl = document.getElementById("nextPeriod");

const azkarList = [
    "سبحان الله",
    "الحمد لله",
    "الله أكبر",
    "لا إله إلا الله",
    "استغفر الله",
    "اللهم صل على محمد",
    "سبحان الله وبحمده",
    "أستغفر الله العظيم",
    "رضيت بالله ربًا"
];

const randomZikrEl = document.getElementById("randomZikr");
const progressBar = document.getElementById("progressBar");

let zikrIndex = 0;
let progress = 0;

function updateCountdown() {
    const now = new Date().getTime();
    const distance = nextSwitch - now;

    if(distance < 0) {
        countdownEl.innerText = "تم التحديث. الرجاء إعادة تحميل الصفحة.";
        return;
    }

    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    countdownEl.innerText = `العد التنازلي لتغيير الأذكار: ${hours} ساعة، ${minutes} دقيقة، ${seconds} ثانية`;
    const nextDate = new Date(nextSwitch);
    nextPeriodEl.innerText = `الفترة التالية للأذكار تبدأ عند: ${nextDate.getHours()}:${nextDate.getMinutes()}`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

function updateRandomZikr() {
    zikrIndex = Math.floor(Math.random() * azkarList.length);
    randomZikrEl.innerText = azkarList[zikrIndex];
    progress = 0;
}
updateRandomZikr();

setInterval(() => {
    progress += 0.066; // 0.066% per 10ms => 100% in 15s
    if(progress >= 100) {
        updateRandomZikr();
    }
    progressBar.style.width = progress + '%';
}, 10);
</script>
</body>
</html>
