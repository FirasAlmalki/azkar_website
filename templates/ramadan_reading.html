<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورد رمضان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .start-button {
            text-align: center;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .start-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .reset-btn:hover {
            background: #ee5a52;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #667eea;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .card-number {
            font-size: 3rem;
            font-weight: bold;
            color: #764ba2;
        }

        .reading-list {
            display: none;
        }

        .reading-list.active {
            display: block;
        }

        .day-section {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .day-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #667eea;
        }

        .day-progress {
            font-size: 0.9rem;
            color: #999;
        }

        .readings {
            display: grid;
            gap: 12px;
        }

        .reading-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .reading-item:hover {
            background: #e8f0ff;
            border-color: #667eea;
        }

        .reading-item.completed {
            background: #e8f8f5;
            border-color: #2ecc71;
        }

        .reading-item.completed .reading-name {
            color: #2ecc71;
            text-decoration: line-through;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #667eea;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .reading-item.completed .checkbox {
            background: #2ecc71;
            border-color: #2ecc71;
            color: white;
        }

        .reading-name {
            flex: 1;
        text-align: center;
            transition: all 0.3s;
        }

        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .no-data h2 {
            margin-bottom: 20px;
            color: white;
        }

        .no-data p {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .day-header {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 ورد رمضان</h1>
            <p>اتبع وردك القرآني لمدة 30 يوم</p>
        </header>

        <div class="start-button">
            <button class="start-btn" id="startBtn" onclick="startRamadan()">ابدأ برنامجك</button>
            <button class="reset-btn" id="resetBtn" onclick="resetRamadan()" style="display: none;">إعادة تعيين</button>
        </div>

        <div class="dashboard" id="dashboard" style="display: none;">
            <div class="card">
                <h3>الأيام المتبقية</h3>
                <div class="card-number" id="remainingDays">30</div>
            </div>
            <div class="card">
                <h3>الأوراد المكتملة</h3>
                <div class="card-number" id="completedReadings">0</div>
            </div>
            <div class="card">
                <h3>الأوراد المتبقية</h3>
                <div class="card-number" id="remainingReadings">150</div>
            </div>
        </div>

        <div class="reading-list" id="readingList">
            <div id="daysContainer"></div>
        </div>

        <div class="no-data" id="noData">
            <h2>👇 اضغط على الزر لبدء برنامجك</h2>
            <p>سيتم إنشاء قائمة أوراد قرآنية لمدة 30 يوم<br>5 أوراد يومية (الفجر، الظهر، العصر، المغرب، العشاء)</p>
        </div>
    </div>

    <script>
        const PRAYERS = [
            { name: 'ورد الفجر', emoji: '🌅' },
            { name: 'ورد الظهر', emoji: '☀️' },
            { name: 'ورد العصر', emoji: '🕐' },
            { name: 'ورد المغرب', emoji: '🌆' },
            { name: 'ورد العشاء', emoji: '🌙' }
        ];

        const STORAGE_KEY = 'ramadan_readings';

        // Cookie management functions
        function setCookie(name, value, days = 365) {
            const expires = new Date();
            expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires.toUTCString()}; path=/; SameSite=Lax`;
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(cookie.substring(nameEQ.length));
                }
            }
            return null;
        }

        function deleteCookie(name) {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        }

        function initializeData() {
            const data = {
                started: new Date().toISOString(),
                days: []
            };

            for (let day = 1; day <= 30; day++) {
                data.days.push({
                    day: day,
                    readings: PRAYERS.map(prayer => ({
                        name: prayer.name,
                        emoji: prayer.emoji,
                        completed: false
                    }))
                });
            }

            // Save to both localStorage and cookies (for sync across devices)
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            setCookie(STORAGE_KEY, JSON.stringify(data), 90);
            return data;
        }

        function getData() {
            // Try to get from localStorage first, fallback to cookies
            let stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) {
                stored = getCookie(STORAGE_KEY);
            }
            return stored ? JSON.parse(stored) : null;
        }

        function saveData(data) {
            // Save to both localStorage and cookies
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            setCookie(STORAGE_KEY, JSON.stringify(data), 90);
            updateDashboard();
            renderReadingList();
        }

        function startRamadan() {
            const data = initializeData();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('noData').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            document.getElementById('readingList').classList.add('active');
            renderReadingList();
        }

        function resetRamadan() {
            if (confirm('هل تريد حقاً إعادة تعيين برنامجك؟')) {
                localStorage.removeItem(STORAGE_KEY);
                deleteCookie(STORAGE_KEY);
                location.reload();
            }
        }

        function updateDashboard() {
            const data = getData();
            if (!data) return;

            const startDate = new Date(data.started);
            const today = new Date();
            const daysElapsed = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            const remainingDays = Math.max(0, 30 - daysElapsed);

            let completedCount = 0;
            let totalReadings = 0;

            data.days.forEach(day => {
                day.readings.forEach(reading => {
                    totalReadings++;
                    if (reading.completed) completedCount++;
                });
            });

            document.getElementById('remainingDays').textContent = remainingDays;
            document.getElementById('completedReadings').textContent = completedCount;
            document.getElementById('remainingReadings').textContent = totalReadings - completedCount;
        }

        function renderReadingList() {
            const data = getData();
            if (!data) return;

            const container = document.getElementById('daysContainer');
            container.innerHTML = '';

            data.days.forEach(day => {
                const completedCount = day.readings.filter(r => r.completed).length;
                
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-section';
                
                let html = `
                    <div class="day-header">
                        <div class="day-title">📅 اليوم ${day.day}</div>
                        <div class="day-progress">${completedCount}/${day.readings.length} مكتملة</div>
                    </div>
                    <div class="readings">
                `;

                day.readings.forEach((reading, index) => {
                    html += `
                        <div class="reading-item ${reading.completed ? 'completed' : ''}" 
                             onclick="toggleReading(${day.day}, ${index})">
                            <span class="reading-name">${reading.emoji} ${reading.name}</span>
                            <div class="checkbox">
                                ${reading.completed ? '✓' : ''}
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                dayDiv.innerHTML = html;
                container.appendChild(dayDiv);
            });
        }

        function toggleReading(day, readingIndex) {
            const data = getData();
            if (!data) return;

            const dayData = data.days.find(d => d.day === day);
            if (dayData) {
                dayData.readings[readingIndex].completed = !dayData.readings[readingIndex].completed;
                saveData(data);
            }
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            const data = getData();
            if (data) {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'inline-block';
                document.getElementById('noData').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                document.getElementById('readingList').classList.add('active');
                updateDashboard();
                renderReadingList();
            }
        });
    </script>
</body>
</html>
